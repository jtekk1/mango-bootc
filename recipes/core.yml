# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    install:
      packages:
        - curl
        - git
        - gh
        - pciutils
        - tailscale
        - xdg-user-dirs
  - type: systemd
    system:
      enabled:
        - tailscaled.service
