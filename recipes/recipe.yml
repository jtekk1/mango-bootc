---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: mango-bootc
description: This is my personal OS image of Mango and Fedora using bootc.

base-image: quay.io/fedora/fedora-bootc
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
  - from-file: repos.yml
  - from-file: core.yml
  - from-file: plymouth.yml

  - type: signing
