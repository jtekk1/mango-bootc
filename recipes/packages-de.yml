---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    install:
      packages:
        - kde-desktop
  - type: files
    files:
      - source: system
        destination: /
  - from-file: packages/repos.yml
  - from-file: packages/core.yml
  - from-file: packages/desktop.yml
  - from-file: packages/hardware.yml
  - from-file: packages/plymouth.yml
  - from-file: packages/system-packages.yml
  - from-file: packages/gaming.yml
  - from-file: packages/dev-dependencies.yml
  - from-file: packages/extras.yml
  - from-file: packages/brew.yml
  - from-file: packages/flatpaks.yml

  - type: signing
