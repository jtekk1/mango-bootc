# --- Shell Integration --- #
# Note: In standard kitty, shell integration is enabled by default.
shell_integration enabled

# --- Fonts --- #
include ~/.config/tekktonic/assets/kitty-colors.conf
font_family CaskaydiaCove Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11
window_padding_width 1 5 2 2

# --- CURSOR --- #
cursor_shape beam
cursor_shape_unfocused hollow
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0
cursor_stop_blinking_after 60.0
cursor_trail 1000
cursor_trail_decay 0.05 0.9
cursor_trail_start_threshold 1

# --- SCROLLBACK --- #
scrollback_lines 2000
scrollbar scrolled
scrollbar_interactive yes
scrollbar_width 0.5
scrollbar_hover_width 1
scrollbar_radius 0.3
scrollbar_gap 0.1
scrollbar_min_handle_height 1
scrollbar_hitbox_expansion 0.25
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0.1
scrollbar_handle_color foreground
scrollbar_track_color foreground
scrollback_pager_history_size 0

# --- URLS --- #
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
show_hyperlink_targets yes
underline_hyperlinks hover

# --- Terminal Bell --- #
enable_audio_bell yes
visual_bell_duration 1.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab 🔔 

# --- Linux --- #
wayland_titlebar_color system
linux_display_server wayland
wayland_enable_ime yes
hide_window_decorations yes

# --- MAC --- #
mac_option_as_alt yes
term xterm-kitty
scrollback_pager nvim -c "set signcolumn=no showtabline=0" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - "

# -- Split Navigation --- #
allow_remote_control yes
listen_on unix:/tmp/mykitty
enabled_layouts splits

# --- Keybindings --- #

# Splits — create
map alt+d launch --location=vsplit
map alt+shift+d launch --location=hsplit
map alt+enter launch --location=split --cwd=current
map ctrl+shift+w close_window

# Splits — focus
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+j neighboring_window down

# Splits — resize
map alt+shift+h resize_window narrower
map alt+shift+l resize_window wider
map alt+shift+k resize_window taller
map alt+shift+j resize_window shorter
